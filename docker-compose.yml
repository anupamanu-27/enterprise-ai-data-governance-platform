services:
  postgres:
    image: postgres:16-alpine
    container_name: governance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-governance_catalog}
      POSTGRES_USER: ${POSTGRES_USER:-governance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-governance_user} -d ${POSTGRES_DB:-governance_catalog}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

