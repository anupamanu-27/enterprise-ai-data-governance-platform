services:
  postgres:
    image: postgres:16-alpine
    container_name: governance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-governance_catalog}
      POSTGRES_USER: ${POSTGRES_USER:-governance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-governance_user} -d ${POSTGRES_DB:-governance_catalog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: governance-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-minio-buckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: governance-minio-buckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-raw};
      mc mb --ignore-existing local/${MINIO_BUCKET_CURATED:-curated};
      mc mb --ignore-existing local/${MINIO_BUCKET_DOCUMENTS:-documents};
      mc ls local;
      "

  minio-client:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-raw}
    entrypoint: ["/bin/sh", "-c"]

  spark:
    image: apache/spark:latest
    container_name: governance-spark
    working_dir: /workspace
    environment:
      SPARK_MODE: client
    volumes:
      - ./:/workspace

  airflow:
    image: apache/airflow:2.10.5
    container_name: governance-airflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_UID: "50000"
    ports:
      - "8080:8080"
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - ./data:/workspace/data
      - ./jobs:/workspace/jobs
      - ./scripts:/workspace/scripts
      - ./src:/workspace/src
    command: standalone

volumes:
  postgres_data:
  minio_data:
